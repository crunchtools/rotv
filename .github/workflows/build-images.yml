name: Build and Push Image Server

on:
  push:
    branches: [main, master]
    paths:
      - 'image-server/**'
      - 'Containerfile.images'
  repository_dispatch:
    types: [parent-image-updated]
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 1'

env:
  REGISTRY: quay.io
  IMAGE_NAME: crunchtools/images-rotv

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile.images
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            activation_key=${{ secrets.RHSM_ACTIVATION_KEY }}
            org_id=${{ secrets.RHSM_ORG_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
