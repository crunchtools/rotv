# Gourmand AI Slop Detection
# Runs on pull requests to detect AI-generated code patterns

name: Gourmand

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'

jobs:
  gourmand:
    name: AI Slop Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Install Gourmand
        run: cargo install gourmand

      - name: Run Gourmand
        run: |
          gourmand --full . || {
            echo "::warning::Gourmand found potential AI slop patterns. Review the output above."
            # Don't fail the build, just warn
            exit 0
          }

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gourmand-report
          path: gourmand-report.txt
          if-no-files-found: ignore
